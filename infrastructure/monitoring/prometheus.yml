global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: daedalus-prod

# All Daedalus microservices expose Prometheus metrics on /metrics.
# Cf. SRS v2.0 §5.3 (Monitoring) and NFR-O01.
scrape_configs:
  - job_name: project-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8080"]
        labels: { service: project-service, language: go }

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8081"]
        labels: { service: auth-service, language: go }

  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets: ["payment-service:8082"]
        labels: { service: payment-service, language: python }

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:8083"]
        labels: { service: notification-service, language: python }

  - job_name: orchestrator-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator-agent:8084"]
        labels: { service: orchestrator-agent, language: python }

  - job_name: procurement-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["procurement-agent:8085"]
        labels: { service: procurement-agent, language: python }

  - job_name: layout-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["layout-engine:8086"]
        labels: { service: layout-engine, language: python }

  - job_name: 3d-asset-service
    metrics_path: /metrics
    static_configs:
      - targets: ["3d-asset-service:8087"]
        labels: { service: 3d-asset-service, language: python }

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-service:8088"]
        labels: { service: analytics-service, language: python }

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
