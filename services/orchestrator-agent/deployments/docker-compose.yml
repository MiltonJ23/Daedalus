version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: daedalus
      POSTGRES_PASSWORD: daedalus
      POSTGRES_DB: daedalus_orchestrator
    ports:
      - "5434:5432"
    volumes:
      - orchestrator_db:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  orchestrator_db:
