version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daedalus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daedalus}
      POSTGRES_DB: ${POSTGRES_DB:-daedalus}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_procurement:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-daedalus}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_procurement:
